<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>/PC - Linux PC in the Browser.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A Linux Shell which runs inside the browser.">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../node_modules/xterm/dist/xterm.css">
    <link href="./favicon.ico" rel="icon" type="image/x-icon">
</head>
<body>
    
    <div class="topnav">
        <div class="divterm"><a href="" class="aelement active"> >_ </a></div>
        <div class="divsubtitle"><span class="subtitlespan">/PC: Learn Linux, Python & Numpy in the Browser.</span></div>
        <div class="nav-right">
            <a class="aelement nav-faq-link" target="_blank" href="faq.html">FAQ</a>
            <a class="aelement nav-github-link" target="_blank" href="https://github.com/prakis/slashpc/" aria-label="GitHub"><svg class="github-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>
        </div>
    </div>

    <main>
        <!-- xterm -->
        <div class="app-window">
            <div class="title-bar">
                <i id="term-play" title="Start" class="material-icons md-48 inactive">play_circle_outline</i>
                <i id="term-pause" title="Stop" class="material-icons md-48 inactive">pause_circle_outline</i>
            </div>
            <div class="divterminal" id="terminal">
                <div class="boot-loader" id="boot-loader">
                    <div class="boot-spinner">
                        <span></span><span></span><span></span><span></span>
                    </div>
                    <p class="boot-status" id="boot-status">Starting Linux…</p>
                    <p class="boot-hint" id="boot-hint">Booting the virtual machine</p>
                </div>
            </div>
        </div>

        <!-- XXX: if you want the v86 console for some reason -->
        <div id="screen_container" hidden>
            <div style="white-space: pre; font: 14px monospace; line-height: 14px"></div>
            <canvas></canvas>
        </div>
        <!-- XXX: button assumed in libv86.js crashes without this -->
        <button id="start_emulation" hidden>Start Emulation</button>
    </main>
    <script src="./index.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>/PC - Linux PC in the Browser.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A Linux Shell which runs inside the browser.">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../node_modules/xterm/dist/xterm.css">
    <link href="./favicon.ico" rel="icon" type="image/x-icon">
</head>
<body>
    
    <div class="topnav">
        <div class="divterm"><a href="" class="aelement active"> >_ </a></div>
        <div class="divsubtitle"><span class="subtitlespan">/PC: Learn Linux, Python & Numpy in the Browser.</span></div>
        <div class="nav-right">
            <a class="aelement nav-faq-link" target="_blank" href="faq.html">FAQ</a>
        </div>
    </div>

    <main>
        <!-- xterm -->
        <div class="app-window">
            <div class="title-bar">
                <i id="term-play" title="Start" class="material-icons md-48 inactive">play_circle_outline</i>
                <i id="term-pause" title="Stop" class="material-icons md-48 inactive">pause_circle_outline</i>
            </div>
            <div class="divterminal" id="terminal">
                <div class="boot-loader" id="boot-loader">
                    <div class="boot-spinner">
                        <span></span><span></span><span></span><span></span>
                    </div>
                    <p class="boot-status" id="boot-status">Starting Linux…</p>
                    <p class="boot-hint" id="boot-hint">Booting the virtual machine</p>
                </div>
            </div>
        </div>

        <!-- XXX: if you want the v86 console for some reason -->
        <div id="screen_container" hidden>
            <div style="white-space: pre; font: 14px monospace; line-height: 14px"></div>
            <canvas></canvas>
        </div>
        <!-- XXX: button assumed in libv86.js crashes without this -->
        <button id="start_emulation" hidden>Start Emulation</button>
    </main>
    <script src="./index.js"></script>
</body>
